version: '3.8'

services:
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - dashboard
    restart: always
    environment:
      - OPENSSL_MODULES=/opt/openssl/.openssl/lib/ossl-modules
      - OPENSSL_CONF=/opt/openssl/.openssl/ssl/openssl.cnf
    volumes:
      - ../docs:/opt/nginx/html/docs
      - /etc/letsencrypt:/etc/letsencrypt:ro

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NEXTAUTH_URL=https://yochanenterprises.com
      - NEXTAUTH_SECRET=a-super-secret-key-for-quantum-licenses
      - DATABASE_URL=postgresql://postgres.rgtfpmyjpxxwcikwidgl:Pass%40supabase@aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?pgbouncer=true
      - DIRECT_URL=postgresql://postgres.rgtfpmyjpxxwcikwidgl:Pass%40supabase@aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres
      - LICENSE_JWT_SECRET=a-super-secret-key-for-quantum-licenses
      - SCANNER_API_URL=http://pqc-scanner:5000/deep-scan

  pqc-scanner:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    command: python3 /opt/scanner_api.py
    ports:
      - "5005:5000"
    restart: always
    environment:
      - OPENSSL_MODULES=/opt/openssl/.openssl/lib/ossl-modules
      - OPENSSL_CONF=/opt/openssl/.openssl/ssl/openssl.cnf
      - LD_LIBRARY_PATH=/opt/openssl/.openssl/lib64:/opt/openssl/.openssl/lib
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  certs:
