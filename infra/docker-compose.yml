version: '3.8'

services:
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    ports:
      - "8088:80"
      - "8444:443"
    depends_on:
      - dashboard
    restart: always
    environment:
      - OPENSSL_MODULES=/opt/openssl/.openssl/lib/ossl-modules
      - OPENSSL_CONF=/opt/openssl/.openssl/ssl/openssl.cnf

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: always
    environment:
      - SCANNER_API_URL=http://pqc-scanner:5000/deep-scan

  pqc-scanner:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    command: python3 /opt/scanner_api.py
    ports:
      - "5005:5000"
    restart: always
    environment:
      - OPENSSL_MODULES=/opt/openssl/.openssl/lib/ossl-modules
      - OPENSSL_CONF=/opt/openssl/.openssl/ssl/openssl.cnf
      - LD_LIBRARY_PATH=/opt/openssl/.openssl/lib64:/opt/openssl/.openssl/lib
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  certs:
