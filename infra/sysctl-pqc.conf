# Yochan-Shield Host Networking Optimization (PQC Jumbo Handshakes)
# Save to /etc/sysctl.d/99-pqc.conf and apply with: sudo sysctl --system

# 1. Enable Path MTU Discovery (PMTUD) explicitly
# Essential for ML-KEM-768 public keys (~1.2KB) which might push the ServerHello
# beyond standard 1500 MTU boundaries, preventing fragmentation deadlocks.
net.ipv4.ip_no_pmtu_disc = 0
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_base_mss = 1024

# 2. Increase TCP max memory & socket buffers for massive state handling
# (Useful when absorbing a flood of large Lattice math packets)
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# 3. Fast socket recycling and syncookies (DDoS mitigation backup to eBPF)
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 65536
net.core.somaxconn = 65536
net.ipv4.tcp_fin_timeout = 15

# 4. Strict Reverse Path Forwarding (Drop Spoofed PQC packets before eBPF)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
