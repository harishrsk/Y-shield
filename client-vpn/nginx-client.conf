worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Yochan-Shield Client VPN Daemon
    # Runs locally on the employee's machine
    
    server {
        listen 8080;
        server_name localhost;

        # Act as a forward proxy for the employee's browser
        location / {
            # The client daemon connects to the AWS Sovereign Gateway
            # It strictly enforces ML-KEM-768 for the outgoing tunnel
            proxy_pass https://13.60.169.185$request_uri;
            
            # Require the Post-Quantum Key Exchange for the tunnel
            proxy_ssl_protocols TLSv1.3;
            proxy_ssl_ciphers HIGH:!aNULL:!MD5;
            
            # Since the Gateway is using a self-signed PQC certificate,
            # the client must verify it (in production, we pin the CA)
            proxy_ssl_verify off; 
            
            proxy_set_header Host yochanenterprises.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;
        }
    }
}
