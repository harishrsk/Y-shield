worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Yochan-Shield Hybrid Cloud Gateway
    server {
        listen       80;
        server_name  localhost;

        # Redirect all HTTP to HTTPS
        add_header X-Sovereign-PQC "Active" always;
        return 301 https://$host$request_uri;
    }

    server {
        listen       443 ssl http2;
        server_name  localhost gateway pqc-scanner;

        # Dual-Signature Stack: Served based on client capability
        # Primary: PQC ML-DSA-65
        ssl_certificate      /opt/nginx/conf/q_server.crt;
        ssl_certificate_key  /opt/nginx/conf/q_server.key;
        
        # Fallback: Classical RSA-4096
        # ssl_certificate      /opt/nginx/conf/c_server.crt;
        # ssl_certificate_key  /opt/nginx/conf/c_server.key;

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Sovereign-PQC "Active" always;

        # Yochan-Shield Critical Path: Enforce PQC Hybrid Key Exchange
        ssl_protocols TLSv1.3;
        # PQC Hybrid Group: Primary ML-KEM-768, Fallbacks secp384r1 & prime256v1
        ssl_ecdh_curve X25519MLKEM768:secp384r1:prime256v1; 
        
        ssl_prefer_server_ciphers off; # TLS 1.3 does not need this, but added for robustness

        location / {
            proxy_pass http://dashboard:3000; # Forwarding to Next.js App
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # PQC API Endpoint for License validation checks by the onboarding scripts
        location /api/pqc-verify {
            proxy_pass http://dashboard:3000/api/pqc-verify;
            add_header X-PQC-Marker "YOCHAN_PQC_READY" always;
        }
    }
}
