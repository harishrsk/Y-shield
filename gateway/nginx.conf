worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Yochan-Shield Hybrid Cloud Gateway
    server {
        listen       80;
        server_name  localhost;

        # Quantum Verification Intercept Page
        add_header Content-Type text/html always;
        add_header X-Sovereign-PQC "Intercept" always;
        return 200 '<!DOCTYPE html>
<html>
<head>
    <title>Access Denied: Quantum Security Required</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .container { background-color: #1e293b; padding: 40px; border-radius: 12px; border: 1px solid #334155; max-width: 600px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h1 { color: #f87171; margin-top: 0; }
        .code { background: #000; padding: 10px; border-radius: 6px; font-family: monospace; color: #10b981; margin: 20px 0; }
        .btn { display: inline-block; background: #10b981; color: #000; padding: 12px 24px; text-decoration: none; font-weight: bold; border-radius: 6px; margin-top: 20px; transition: background 0.2s; }
        .btn:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Access Denied</h1>
        <h3>Strict Post-Quantum Cryptography Required</h3>
        <p>This Sovereign Gateway strictly enforces <strong>ML-KEM-768</strong> encryption. Your current browser only supports classical mathematics, making this connection vulnerable to "Harvest Now, Decrypt Later" attacks.</p>
        
        <div style="text-align: left; background: #0f172a; padding: 20px; border-radius: 8px; margin-top: 30px;">
            <h4 style="margin-top:0; color: #94a3b8;">How to access this network:</h4>
            <p><strong>Option A: Enable Browser Support</strong></p>
            <ol style="color: #cbd5e1; font-size: 14px;">
                <li>Type <span class="code" style="padding:2px 6px;">chrome://flags</span> or <span class="code" style="padding:2px 6px;">edge://flags</span> in your URL bar.</li>
                <li>Search for <strong>"Post-quantum key agreement for TLS"</strong>.</li>
                <li>Set it to <strong>Enabled</strong> and restart your browser.</li>
            </ol>
            
            <p style="margin-top:20px;"><strong>Option B: Enterprise Users</strong></p>
            <p style="color: #cbd5e1; font-size: 14px;">Launch your Yochan-Shield VPN Client Desktop App to automatically tunnel your traffic.</p>
        </div>
        
        <a href="https://$host$request_uri" class="btn">I have enabled PQC - Proceed Securely</a>
    </div>
</body>
</html>';
    }

    server {
        listen       443 ssl http2;
        server_name  localhost gateway pqc-scanner;

        # Dual-Signature Stack: Served based on client capability
        # Primary: PQC ML-DSA-65
        ssl_certificate      /opt/nginx/conf/q_server.crt;
        ssl_certificate_key  /opt/nginx/conf/q_server.key;
        
        # Fallback: Classical RSA-4096
        # ssl_certificate      /opt/nginx/conf/c_server.crt;
        # ssl_certificate_key  /opt/nginx/conf/c_server.key;

        # Security Headers
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always; # Disabled for Self-Signed Cert Testing
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Sovereign-PQC "Active" always;

        # Yochan-Shield Critical Path: Enforce PQC Hybrid Key Exchange
        ssl_protocols TLSv1.3;
        # PQC Hybrid Group: Primary ML-KEM-768, Fallback secp384r1
        ssl_ecdh_curve X25519MLKEM768:secp384r1; 
        
        ssl_prefer_server_ciphers off; # TLS 1.3 does not need this, but added for robustness

        location / {
            proxy_pass http://dashboard:3000; # Forwarding to Next.js App
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # PQC API Endpoint for License validation checks by the onboarding scripts
        location /api/pqc-verify {
            proxy_pass http://dashboard:3000/api/pqc-verify;
            add_header X-PQC-Marker "YOCHAN_PQC_READY" always;
        }
    }
}
