worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ═══════════════════════════════════════════════════════════════════
    # ENTERPRISE TELEMETRY: SIEM-Ready JSON Logging
    # ═══════════════════════════════════════════════════════════════════
    log_format json_analytics escape=json '{'
        '"timestamp": "$time_iso8601", '
        '"remote_addr": "$remote_addr", '
        '"request_id": "$request_id", '
        '"status": "$status", '
        '"request_time": "$request_time", '
        '"pqc_status": "$upstream_http_x_sovereign_pqc", '
        '"ssl_protocol": "$ssl_protocol", '
        '"ssl_cipher": "$ssl_cipher", '
        '"ssl_curve": "$ssl_curves", '
        '"http_host": "$host", '
        '"request_method": "$request_method", '
        '"request_uri": "$request_uri", '
        '"http_referrer": "$http_referer", '
        '"http_user_agent": "$http_user_agent"'
    '}';

    access_log /opt/nginx/logs/access.log json_analytics;

    # ═══════════════════════════════════════════════════════════════════
    # DDOS PROTECTION: Asymmetric Lattice Math Shield
    # ═══════════════════════════════════════════════════════════════════
    limit_req_zone $binary_remote_addr zone=pqc_limit:20m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=pqc_conn:10m;

    sendfile        on;
    keepalive_timeout  65;

    # Include modular tenant configurations for isolated banking instances
    include /opt/nginx/conf/tenants.d/*.conf;

    # Yochan-Shield Hybrid Cloud Gateway
    server {
        listen       80;
        server_name  _;
        
        location /healthz {
            access_log off;
            add_header Content-Type text/plain;
            add_header X-Health-Status "READY";
            add_header X-PQC-Engine "VERIFIED";
            return 200 'READY';
        }

        # Error Trap: Rate Limit Response
        error_page 429 = @rate_limit_trap;

        location @rate_limit_trap {
            add_header Content-Type application/json;
            return 429 '{"error": "Asymmetric Lattice Load Protection Active", "retry_after": "10s"}';
        }

        # Quantum Verification Intercept Page
        # Quantum Verification Intercept Page
        location / {
            add_header Content-Type text/html always;
            add_header X-Sovereign-PQC "Intercept" always;
            return 200 '<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Shield: PQC Handshake Required</title>
    <style>
        :root { --pqc-glow: #10b981; --bg: #020617; }
        body { background: var(--bg); color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .glass-container { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 3rem; max-width: 650px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; z-index: 10; text-align: center; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(to right, #fb7185, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(244, 63, 94, 0.1); border: 1px solid #f43f5e; color: #f43f5e; padding: 0.5rem 1rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .guide-box { background: rgba(15, 23, 42, 0.8); border-radius: 16px; padding: 2rem; border: 1px solid rgba(16, 185, 129, 0.2); margin: 2rem 0; text-align: left; }
        .step { margin-bottom: 1.5rem; font-size: 0.95rem; }
        .step-num { color: var(--pqc-glow); font-weight: 900; margin-right: 0.5rem; }
        .code-snippet { background: #000; color: var(--pqc-glow); padding: 0.4rem 0.8rem; border-radius: 6px; font-family: monospace; font-size: 0.9rem; border: 1px solid rgba(16, 185, 129, 0.3); }
        .btn-prime { display: block; width: 100%; background: var(--pqc-glow); color: #020617; text-align: center; padding: 1.25rem; border-radius: 12px; font-weight: 800; text-decoration: none; font-size: 1.1rem; transition: all 0.2s; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); border: none; cursor: pointer; }
        .btn-prime:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(16, 185, 129, 0.6); }
        .footer-note { font-size: 0.75rem; color: #64748b; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="status-badge">● PQC Handshake: Not Detected</div>
        <h1>Sovereign Access Denied</h1>
        <p style="color: #94a3b8; line-height: 1.6; font-size: 1.1rem;">This gateway strictly enforces <strong>Post-Quantum Cryptography (ML-KEM-768)</strong>. Your connection is currently non-compliant.</p>
        
        <div class="guide-box">
            <h3 style="margin-top: 0; color: var(--pqc-glow); letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.8rem;">Required Action: Enable Browser Support</h3>
            <div class="step">
                <span class="step-num">01.</span> Enter <span class="code-snippet">chrome://flags</span> in your browser URL bar.
            </div>
            <div class="step">
                <span class="step-num">02.</span> Search for <strong style="color:white;">"Post-quantum key agreement"</strong>.
            </div>
            <div class="step">
                <span class="step-num">03.</span> Set to <strong style="color:#10b981;">ENABLED</strong> and restart your browser.
            </div>
        </div>

        <a href="https://$host$request_uri" class="btn-prime">Verify PQC & Enter Secure Gateway</a>
        
        <div class="footer-note">
            Yochan-Shield Sovereign Core v2.0 | FIPS 203 Compliance Required
        </div>
    </div>
</body>
</html>';
        }
    }

    server {
        listen       443 ssl http2;
        server_name  _;

        # Inject Traceability
        add_header X-Request-ID $request_id always;

        # ═══════════════════════════════════════════════════════════════════
        # MULTI-SIGNATURE STACK
        # ═══════════════════════════════════════════════════════════════════
        ssl_certificate      /opt/nginx/conf/q_server.crt;
        ssl_certificate_key  /opt/nginx/conf/q_server.key;
        ssl_certificate      /opt/nginx/conf/c_server.crt;
        ssl_certificate_key  /opt/nginx/conf/c_server.key;

        # Strict Security Headers (Disabled for Testing to prevent Chrome blocks)
        # add_header X-Frame-Options "SAMEORIGIN" always;
        # add_header X-Content-Type-Options "nosniff" always;
        add_header X-Sovereign-PQC "Active" always;
        add_header X-ZK-Mode "stateless" always;
        add_header X-SCA-Protection "constant-time-masked" always;
        add_header X-QDPI-Engine "active" always;

        # ═══════════════════════════════════════════════════════════════════
        # PQC PROTOCOL ENFORCEMENT
        # ═══════════════════════════════════════════════════════════════════
        ssl_protocols TLSv1.3;
        ssl_ecdh_curve X25519MLKEM768:secp384r1; 
        ssl_prefer_server_ciphers off;

        # Readiness Probe
        location /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'READY';
        }

        # SEO & Search Console Endpoints
        location = /sitemap.xml {
            proxy_pass http://dashboard:3000/sitemap.xml;
            proxy_set_header Host $host;
            add_header Content-Type "application/xml";
            expires -1;
        }

        location = /robots.txt {
            proxy_pass http://dashboard:3000/robots.txt;
            proxy_set_header Host $host;
            add_header Content-Type "text/plain";
            expires -1;
        }

        # DDoS Rate Limiting applied to all proxy traffic
        limit_req zone=pqc_limit burst=20 nodelay;
        limit_conn pqc_conn 10;

        # Documentation Access for External Clients
        location /docs/ {
            alias /opt/nginx/html/docs/;
            autoindex on;
            add_header Content-Type text/plain;
            add_header X-Document-Status "Official" always;
        }

        location / {
            proxy_pass http://dashboard:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # Explicit PQC API traps
        location /api/pqc-verify {
            proxy_pass http://dashboard:3000/api/pqc-verify;
            add_header X-PQC-Marker "YOCHAN_PQC_READY" always;
        }
    }

    # ═══════════════════════════════════════════════════════════════════
    # PREMIUM TIER: Merkle-Failsafe (SLH-DSA / SPHINCS+)
    # ═══════════════════════════════════════════════════════════════════
    server {
        listen       8443 ssl http2;
        server_name  _;

        # ISOLATED HARDENING: Handle Massive Stateless Hash-Based Signatures
        # SLH-DSA signatures are ~40x larger than ML-DSA. 
        # Large buffers are restricted to this listener to prevent global RAM exhaustion.
        large_client_header_buffers 4 128k;
        ssl_buffer_size 16k;

        ssl_certificate      /opt/nginx/conf/premium_server.crt;
        ssl_certificate_key  /opt/nginx/conf/premium_server.key;

        ssl_protocols TLSv1.3;
        ssl_ecdh_curve X25519MLKEM768; 
        ssl_prefer_server_ciphers off;

        # Traceability & Tier Identifiers
        add_header X-PQC-Tier "PREMIUM-MERKLE-FAILSAFE" always;
        add_header X-Signature-Scheme "SLH-DSA-Stateless" always;
        add_header X-Sovereign-PQC "Active" always;

        location / {
            proxy_pass http://dashboard:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $premium_$request_id;
        }

        # Documentation Access (Internal Volume)
        location /docs/ {
            alias /opt/nginx/html/docs/;
            autoindex on;
            add_header Content-Type text/plain;
        }
    }
}
